# CoreCraft — signet (RPC 38332, P2P 38333 por defeito no Bitcoin Core).
# Para regtest/mainnet, ajustar rede e portas no conf + docker-compose + .env.

server=1
txindex=1
zmqpubrawblock=tcp://0.0.0.0:28332
zmqpubhashblock=tcp://0.0.0.0:28332
zmqpubrawtx=tcp://0.0.0.0:28333

[signet]
rpcbind=0.0.0.0
rpcallowip=0.0.0.0/0
fallbackfee=0.0002

# Credenciais: serviço Docker passa -rpcuser / -rpcpassword (alinhar ao .env da raiz e das atividades).
